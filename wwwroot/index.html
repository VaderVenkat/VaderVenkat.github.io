<head>
    <meta charset="utf-8" />

    <meta name="keywords" content="Unity Game Developer, C#, Blazor, Game Development, Chennai, India, 3D Games" />

    <!-- Open Graph -->
    <meta property="og:title" content="Venkateshan K.S — Unity Game Developer" />
    <meta property="og:description" content="Crafting immersive game experiences with Unity & C# from Chennai, India." />
    <meta property="og:type" content="website" />

    <title>Venkateshan K.S — Unity Game Developer</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <base href="/" />
</head>

<body>
    <div id="app">
        <!-- Loading screen -->
        <div style="
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            background: #fff;
            color: #111;
        ">
            <div style="font-size:2rem;font-weight:800;letter-spacing:-1px;margin-bottom:1.5rem;">
                V<span style="color:#E84545;">.</span>
            </div>
            <div style="
                width: 40px;
                height: 3px;
                background: #f0f0f0;
                border-radius: 100px;
                overflow: hidden;
                position: relative;
            ">
                <div style="
                    position: absolute;
                    left: -40px;
                    width: 40px;
                    height: 100%;
                    background: #E84545;
                    border-radius: 100px;
                    animation: loading 1s ease-in-out infinite;
                "></div>
            </div>
            <style>
                @keyframes loading {
                    0% { left: -40px; }
                    100% { left: 40px; }
                }
            </style>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none;">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
